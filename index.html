<!DOCTYPE html>
<html>
<head>
<title>Somnath Result Portal</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
text-align:center;
padding:50px;
}
.box{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px gray;
}
input{
width:90%;
padding:10px;
margin:10px;
}
button{
padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>
<body>

<div class="box">
<h1>Somnath Result Portal</h1>

<input type="text" id="roll" placeholder="Enter Roll No">
<br>

<input type="text" id="code" placeholder="Enter Roll Code">
<br>

<button onclick="checkResult()">View Result</button>

<h3 id="result"></h3>
</div>

<script>
function checkResult(){
let roll=document.getElementById("roll").value;
let code=document.getElementById("code").value;

if(roll=="112" && code=="4046"){
document.getElementById("result").innerHTML=
"Name: SOMNATH KUMAR UPADHYAY<br>Marks: 32/40<br>Percentage: 80%";
}else{
document.getElementById("result").innerHTML=
"Result Not Found";
}
}
</script>

</body>
</html>
